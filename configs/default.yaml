# Default experiment config. Every knob is a value, not a code edit, so the
# Phase-8 ablation matrix is just a set of overrides:
#   python scripts/train.py model.use_pairwise_head=false
experiment: default

paths:
  raw: data            # raw downloads only
  artifacts: artifacts # derived tables / predictions / embeddings
  runs: runs

data:
  corpora: [clear, onestop, cefr]
  unified_table: artifacts/corpus.csv
  min_tokens: 3
  max_tokens: 600

splits:
  holdout_corpora: []      # e.g. [onestop] -> cross-corpus gold test
  holdout_formats: []      # e.g. [poetry]  -> cross-format gold test
  group_by: corpus
  n_folds: 5
  val_fraction: 0.1
  seed: 42

model:
  backbone: microsoft/deberta-v3-base
  max_length: 512
  dropout: 0.1
  use_pairwise_head: true
  use_source_offset: true
  peft: false

train:
  stage: finetune          # pretrain (on pseudo-labels) | finetune (on gold)
  epochs: 3
  batch_size: 16
  lr: 2.0e-5
  weight_decay: 0.01
  pointwise_weight: 1.0
  pairwise_weight: 1.0
  confidence_weighting: true
  two_stage: false         # true -> pretrain on pseudo (pretrain_lr) then finetune on gold
  pretrain_lr: 1.0e-5
  pretrain_epochs: 1
  seed: 42

external:                    # Phase 4: diverse unlabeled pool
  sources: [wiki_simple, wiki_en, gutenberg]
  per_source_docs: 5000      # streamed per source (bounded); raise freely on the H100
  n_total: 200000            # diverse-selected pool size
  n_bins: 10
  pool_table: artifacts/external_pool.csv

teacher:                     # Phase 4: teacher ensemble (predicts CLEAR BT)
  backbone: microsoft/deberta-v3-base
  n_teachers: 3
  target_col: native_label
  dir: models/teachers

pseudo:                      # Phase 4: pseudo-label filtering + merge
  k_se: 1.0                  # keep |pred - neighbour| <= k_se * neighbour s.e.
  max_std: null              # disagreement gate (null -> median split)
  dedup_cosine: 0.05         # drop pool chunks within this cosine dist of a gold passage
  extrapolate: true          # extrapolate the axis beyond CLEAR's range (vs clamp)
  embed_backbone: sentence-transformers/all-MiniLM-L6-v2
  out_table: artifacts/pseudo_labeled.csv
  train_pool_table: artifacts/train_pool.csv

eval:
  # Reference bracket is read straight off the raw CLEAR corpus, so these are
  # CLEAR's own column names.
  target_col: "BT Easiness"
  se_col: "BT s.e."
  formula_cols:
    - Flesch-Reading-Ease
    - Flesch-Kincaid-Grade-Level
    - New Dale-Chall Readability Formula
    - CAREC
  solution_cols:
    - firstPlace_pred
    - secondPlace_pred
    - thirdPlace_pred
  n_bootstrap: 1000
  seed: 42
