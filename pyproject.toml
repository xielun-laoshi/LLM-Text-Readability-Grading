# The project is a set of Python scripts (under scripts/), not an installed
# package -- so this file only carries tooling config. The `readability` support
# lib resolves because scripts/ is on sys.path[0] when a script is run directly,
# and on pytest's pythonpath below.
[tool.pytest.ini_options]
pythonpath = ["scripts"]
testpaths = ["tests"]
addopts = "-q"
